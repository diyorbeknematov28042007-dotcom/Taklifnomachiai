<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bosqich 1 — Tekshirish</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,system-ui,sans-serif;background:#f8f9fa;padding:16px;max-width:480px;margin:0 auto}
h1{font-size:20px;margin-bottom:16px;text-align:center}
.test{background:#fff;border-radius:12px;padding:14px 16px;margin-bottom:8px;border:1px solid #e5e7eb;display:flex;align-items:center;gap:10px}
.icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
.info{flex:1}
.name{font-size:14px;font-weight:600;color:#1a1a1a}
.detail{font-size:12px;color:#666;margin-top:2px}
.pending .icon::after{content:'⏳'}
.pass .icon::after{content:'✅'}
.fail .icon::after{content:'❌'}
.warn .icon::after{content:'⚠️'}
.summary{background:#fff;border-radius:12px;padding:20px;margin-top:16px;text-align:center;border:1px solid #e5e7eb}
.summary h2{font-size:18px;margin-bottom:12px}
.counts{display:flex;justify-content:center;gap:20px;font-size:14px}
.counts span{font-weight:700}
.btn{display:block;width:100%;padding:14px;background:#7c3aed;color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;margin-top:16px;font-family:inherit}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:.5}
</style>
</head>
<body>
<h1>🧪 Bosqich 1 — Tekshirish</h1>
<div id="tests"></div>
<div class="summary" id="summary" style="display:none">
<h2 id="verdict"></h2>
<div class="counts">
<div>✅ <span id="passC">0</span></div>
<div>❌ <span id="failC">0</span></div>
<div>⚠️ <span id="warnC">0</span></div>
</div>
</div>
<button class="btn" id="runBtn" onclick="runTests()">🚀 Testlarni ishga tushirish</button>

<script>
const BASE = window.location.origin;
let pass=0,fail=0,warn=0;
const tests = document.getElementById('tests');

function addTest(name){
  const div = document.createElement('div');
  div.className = 'test pending';
  div.innerHTML = `<div class="icon"></div><div class="info"><div class="name">${name}</div><div class="detail">Tekshirilmoqda...</div></div>`;
  tests.appendChild(div);
  return div;
}

function setResult(div, status, detail){
  div.className = 'test ' + status;
  div.querySelector('.detail').textContent = detail;
  if(status==='pass')pass++;
  else if(status==='fail')fail++;
  else warn++;
}

async function runTests(){
  document.getElementById('runBtn').disabled=true;
  tests.innerHTML='';
  pass=fail=warn=0;

  // 1. Health
  const t1=addTest('Health endpoint');
  try{
    const r=await fetch(BASE+'/api/health');
    const d=await r.json();
    if(d.status==='ok'&&d.db==='connected'){
      setResult(t1,'pass',`DB: ${d.dbLatency||'?'} | Uptime: ${d.uptime||'?'} | ENV: ${d.env||'?'}`);
    }else{
      setResult(t1,'fail','DB: '+(d.db||'unknown'));
    }
  }catch(e){setResult(t1,'fail',e.message)}

  // 2. Security headers
  const t2=addTest('Xavfsizlik headerlari');
  try{
    const r=await fetch(BASE+'/api/health');
    const h1=r.headers.get('x-content-type-options');
    const h2=r.headers.get('x-frame-options');
    if(h1&&h2) setResult(t2,'pass',`XCTO: ${h1}, XFO: ${h2}`);
    else if(h1||h2) setResult(t2,'warn','Ba\'zi headerlar yo\'q');
    else setResult(t2,'warn','Security headerlar yo\'q — yangi server push qilinganmi?');
  }catch(e){setResult(t2,'fail',e.message)}

  // 3. Templates
  const t3=addTest('Templates API');
  try{
    const r=await fetch(BASE+'/api/templates');
    const d=await r.json();
    if(d.templates&&d.templates.length>0) setResult(t3,'pass',d.templates.length+' ta shablon topildi');
    else if(d.templates) setResult(t3,'warn','Shablonlar bo\'sh — seed data kerak');
    else setResult(t3,'fail','Noto\'g\'ri javob: '+JSON.stringify(d).slice(0,80));
  }catch(e){setResult(t3,'fail',e.message)}

  // 4. Auth — bo'sh login
  const t4=addTest('Auth: bo\'sh login rad etish');
  try{
    const r=await fetch(BASE+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:'',password:'123456'})});
    const d=await r.json();
    if(r.status>=400&&d.error) setResult(t4,'pass','Rad etildi: '+d.error);
    else setResult(t4,'fail','Bo\'sh login qabul qilindi!');
  }catch(e){setResult(t4,'fail',e.message)}

  // 5. Auth — qisqa parol
  const t5=addTest('Auth: qisqa parol rad etish');
  try{
    const r=await fetch(BASE+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:'testxyz99','password:'12'})});
    const d=await r.json();
    if(r.status>=400&&d.error) setResult(t5,'pass','Rad etildi: '+d.error);
    else setResult(t5,'fail','Qisqa parol qabul qilindi!');
  }catch(e){setResult(t5,'fail',e.message)}

  // 6. Auth — noto'g'ri login
  const t6=addTest('Auth: noto\'g\'ri login/parol');
  try{
    const r=await fetch(BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login:'fake_user_xyz_999','password:'wrong'})});
    const d=await r.json();
    if(r.status===401&&d.error) setResult(t6,'pass','401 rad etildi');
    else setResult(t6,'fail','Noto\'g\'ri status: '+r.status);
  }catch(e){setResult(t6,'fail',e.message)}

  // 7. Token himoyasi
  const t7=addTest('Auth: tokensiz /me rad etish');
  try{
    const r=await fetch(BASE+'/api/auth/me');
    if(r.status===401) setResult(t7,'pass','401 qaytarildi');
    else setResult(t7,'fail','Status: '+r.status+' (401 kutilgan)');
  }catch(e){setResult(t7,'fail',e.message)}

  // 8. Admin himoyasi
  const t8=addTest('Admin: kalitsiz rad etish');
  try{
    const r=await fetch(BASE+'/api/admin/stats');
    if(r.status===403) setResult(t8,'pass','403 Forbidden');
    else setResult(t8,'fail','Status: '+r.status+' (403 kutilgan)');
  }catch(e){setResult(t8,'fail',e.message)}

  // 9. Admin noto'g'ri kalit
  const t9=addTest('Admin: noto\'g\'ri kalit rad etish');
  try{
    const r=await fetch(BASE+'/api/admin/stats',{headers:{'x-admin-key':'wrong-key-123'}});
    if(r.status===403) setResult(t9,'pass','403 Forbidden');
    else setResult(t9,'fail','Status: '+r.status);
  }catch(e){setResult(t9,'fail',e.message)}

  // 10. 404 slug
  const t10=addTest('Topilmagan slug xato qaytarish');
  try{
    const r=await fetch(BASE+'/api/invitations/by-slug/nonexistent_test_slug_xyz');
    if(r.status===404) setResult(t10,'pass','404 qaytarildi');
    else setResult(t10,'fail','Status: '+r.status);
  }catch(e){setResult(t10,'fail',e.message)}

  // 11. Topilmagan template
  const t11=addTest('Topilmagan template 404');
  try{
    const r=await fetch(BASE+'/api/templates/zzz_nonexistent');
    if(r.status===404) setResult(t11,'pass','404 qaytarildi');
    else setResult(t11,'fail','Status: '+r.status);
  }catch(e){setResult(t11,'fail',e.message)}

  // 12. RSVP validatsiya
  const t12=addTest('RSVP: bo\'sh invitationId rad etish');
  try{
    const r=await fetch(BASE+'/api/responses',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:'test'})});
    const d=await r.json();
    if(r.status>=400) setResult(t12,'pass','Rad etildi');
    else setResult(t12,'fail','Qabul qilindi — validatsiya yo\'q');
  }catch(e){setResult(t12,'fail',e.message)}

  // 13. SPA fallback
  const t13=addTest('SPA fallback (/profile)');
  try{
    const r=await fetch(BASE+'/profile');
    if(r.status===200){
      const t=await r.text();
      if(t.includes('root')) setResult(t13,'pass','HTML qaytarildi');
      else setResult(t13,'warn','200 lekin content noto\'g\'ri');
    }else setResult(t13,'fail','Status: '+r.status);
  }catch(e){setResult(t13,'fail',e.message)}

  // 14. JSON limit
  const t14=addTest('JSON body limit (1MB)');
  try{
    const big=JSON.stringify({login:'x',password:'y'.repeat(1500000)});
    const r=await fetch(BASE+'/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:big});
    if(r.status===413||r.status===400) setResult(t14,'pass','Katta body rad etildi ('+r.status+')');
    else setResult(t14,'warn','Status: '+r.status+' (413 yoki 400 kutilgan)');
  }catch(e){setResult(t14,'warn','Network error (ehtimol to\'g\'ri bloklangan)')}

  // Show summary
  document.getElementById('summary').style.display='block';
  document.getElementById('passC').textContent=pass;
  document.getElementById('failC').textContent=fail;
  document.getElementById('warnC').textContent=warn;
  document.getElementById('verdict').textContent = fail===0 ? '🎉 Bosqich 1 TAYYOR!' : `🔧 ${fail} ta xato tuzatish kerak`;
  document.getElementById('runBtn').disabled=false;
  document.getElementById('runBtn').textContent='🔄 Qayta tekshirish';
}
</script>
</body>
</html>
